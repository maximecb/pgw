<script>
document.addEventListener('keydown', (e) => {
    let ctrlDown = e.ctrlKey || e.metaKey;

    // Ctrl + C
    if (ctrlDown && e.key.toUpperCase() === 'C') {
        navigator.clipboard.writeText("open {{ md_path }}");
    }

    // Shift + left arrow
    if (e.shiftKey && event.keyCode === 37) {
        window.location.href = "{{ prev_path }}";
    }

    // Shift + right arrow
    if (e.shiftKey && event.keyCode === 39) {
        window.location.href = "{{ next_path }}";
    }

    // Shift + P
    if (e.shiftKey && e.key.toUpperCase() === 'P') {
        if (!window.location.hostname.includes('pointersgonewild')) {
            window.location.href = 'https://pointersgonewild.com/' + "{{ self_path }}";
        }
    }
});
